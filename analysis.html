<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booth Analysis - Know Your Voter</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    @media print {
      .no-print {
        display: none;
      }
      .print-break {
        page-break-after: always;
      }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow sticky top-0 z-50 no-print">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex-shrink-0 text-2xl font-bold text-orange-500 tracking-wide">
          🗳️ Know Your Voter
        </div>
        <div class="flex gap-4 items-center">
          <button id="backBtn" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
            ← Back
          </button>
          <button id="printBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
            🖨️ Print
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-b-2xl p-6 sm:p-8 mt-4 mb-4">

    <!-- Header -->
    <div class="mb-8">
      <h1 id="pageTitle" class="text-3xl font-bold text-indigo-700 mb-2">Booth-wise Last Names Analysis</h1>
      <p id="pageSubtitle" class="text-gray-600">📍 <span id="districtName"></span> • <span id="constituencyName"></span></p>
      <p id="generatedDate" class="text-sm text-gray-500 mt-2"></p>
    </div>

    <!-- Booth Selector (no-print) -->
    <div class="mb-6 flex gap-2 items-center no-print">
      <label class="font-semibold">Filter by Booth:</label>
      <select id="boothFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">-- All Booths --</option>
      </select>
    </div>

    <!-- Data Container -->
    <div id="analysisContainer" class="space-y-8"></div>

  </div>

  <script>
    let boothDataJSON = null;
    const params = new URLSearchParams(window.location.search);
    const district = params.get('district') || 'N/A';
    const constituency = params.get('constituency') || 'N/A';

    // Initialize page
    document.getElementById('districtName').textContent = district;
    document.getElementById('constituencyName').textContent = constituency;

    // Load booth data
    async function loadBoothData() {
      try {
        const filename = `${constituency.toLowerCase()}-booths.json`;
        const res = await fetch(filename);
        if (res.ok) {
          boothDataJSON = await res.json();
          document.getElementById('generatedDate').textContent = `Generated: ${new Date(boothDataJSON.generated_at).toLocaleString()}`;
          populateBoothFilter();
          displayAllBooths();
        } else {
          document.getElementById('analysisContainer').innerHTML = `<p class="text-red-600">Data not found for ${constituency}</p>`;
        }
      } catch (err) {
        console.error('Error loading booth data:', err);
        document.getElementById('analysisContainer').innerHTML = `<p class="text-red-600">Error loading data: ${err.message}</p>`;
      }
    }

    // Populate booth filter dropdown
    function populateBoothFilter() {
      if (!boothDataJSON) return;
      const boothNumbers = Object.keys(boothDataJSON.booths).map(Number).sort((a, b) => a - b);
      const select = document.getElementById('boothFilter');
      select.innerHTML = `<option value="">-- All Booths --</option>
        ${boothNumbers.map(b => `<option value="${b}">Booth ${b}</option>`).join('')}`;
    }

    // Display all booths in 3-column layout
    function displayAllBooths() {
      if (!boothDataJSON) return;
      
      const booths = boothDataJSON.booths;
      const boothNumbers = Object.keys(booths).map(Number).sort((a, b) => a - b);
      const container = document.getElementById('analysisContainer');

      container.innerHTML = boothNumbers.map(boothNum => {
        const data = booths[boothNum];
        const lastNames = data.last_names;

        if (lastNames.length === 0) {
          return `
            <div class="bg-gray-50 border border-gray-300 rounded-lg p-6 print-break">
              <h3 class="text-xl font-semibold text-indigo-700 mb-2">Booth ${boothNum}</h3>
              <p class="text-sm text-gray-600 mb-4">Total Voters: <strong>${data.total_voters}</strong></p>
              <p class="text-gray-500">No last names with count > 8</p>
            </div>
          `;
        }

        // Divide last names into 3 columns vertically
        const rowsPerColumn = Math.ceil(lastNames.length / 3);
        const rows = [];
        for (let i = 0; i < rowsPerColumn; i++) {
          const row = [];
          for (let col = 0; col < 3; col++) {
            const index = col * rowsPerColumn + i;
            const item = lastNames[index];
            if (item) {
              row.push(`
                <td class="py-2 px-3 border font-medium">${item.name}</td>
                <td class="py-2 px-3 border text-center">${item.count}</td>
              `);
            } else {
              row.push(`
                <td class="py-2 px-3 border"></td>
                <td class="py-2 px-3 border"></td>
              `);
            }
          }
          rows.push(`<tr class="even:bg-gray-50">${row.join('')}</tr>`);
        }

        return `
          <div class="bg-gray-50 border border-gray-300 rounded-lg p-6 print-break">
            <h3 class="text-xl font-semibold text-indigo-700 mb-2">Booth ${boothNum}</h3>
            <p class="text-sm text-gray-600 mb-4">Total Voters: <strong>${data.total_voters}</strong></p>
            <div class="overflow-x-auto">
              <table class="w-full text-center text-sm border border-gray-300">
                <thead class="bg-indigo-100 text-gray-700">
                  <tr>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }).join('');
    }

    // Filter by booth
    function filterByBooth(boothNum) {
      if (!boothDataJSON) return;
      
      const booths = boothDataJSON.booths;
      const container = document.getElementById('analysisContainer');

      if (boothNum === '' || boothNum === null) {
        displayAllBooths();
      } else {
        const data = booths[boothNum];
        const lastNames = data.last_names;

        if (lastNames.length === 0) {
          container.innerHTML = `
            <div class="bg-gray-50 border border-gray-300 rounded-lg p-6">
              <h3 class="text-2xl font-semibold text-indigo-700 mb-4">Booth ${boothNum}</h3>
              <p class="text-gray-600 mb-4">Total Voters: <strong>${data.total_voters}</strong></p>
              <p class="text-gray-500">No last names with count > 8</p>
            </div>
          `;
          return;
        }

        // Divide last names into 3 columns vertically
        const rowsPerColumn = Math.ceil(lastNames.length / 3);
        const rows = [];
        for (let i = 0; i < rowsPerColumn; i++) {
          const row = [];
          for (let col = 0; col < 3; col++) {
            const index = col * rowsPerColumn + i;
            const item = lastNames[index];
            if (item) {
              row.push(`
                <td class="py-2 px-3 border font-medium">${item.name}</td>
                <td class="py-2 px-3 border text-center">${item.count}</td>
              `);
            } else {
              row.push(`
                <td class="py-2 px-3 border"></td>
                <td class="py-2 px-3 border"></td>
              `);
            }
          }
          rows.push(`<tr class="even:bg-gray-50">${row.join('')}</tr>`);
        }

        container.innerHTML = `
          <div class="bg-gray-50 border border-gray-300 rounded-lg p-6">
            <h3 class="text-2xl font-semibold text-indigo-700 mb-4">Booth ${boothNum}</h3>
            <p class="text-gray-600 mb-4">Total Voters: <strong>${data.total_voters}</strong></p>
            <div class="overflow-x-auto">
              <table class="w-full text-center text-sm border border-gray-300">
                <thead class="bg-indigo-100 text-gray-700">
                  <tr>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }
    }

    // Event listeners
    document.getElementById('backBtn').addEventListener('click', () => {
      window.history.back();
    });

    document.getElementById('printBtn').addEventListener('click', () => {
      window.print();
    });

    document.getElementById('boothFilter').addEventListener('change', (e) => {
      filterByBooth(e.target.value);
    });

    // Load data on page load
    loadBoothData();
  </script>

</body>

</html>
