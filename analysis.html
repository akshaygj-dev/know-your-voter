<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booth Analysis - Know Your Voter</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- Heroicons -->
  <script src="https://unpkg.com/heroicons@2.0.16/dist/24/solid.js"></script>

  <!-- Scripts -->
  <script src="utils.js" defer></script>
  <script src="voter-search.js" defer></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    @media print {
      .no-print {
        display: none;
      }
      .print-break {
        page-break-after: always;
      }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow sticky top-0 z-50 no-print">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex-shrink-0 text-2xl font-bold text-orange-500 tracking-wide">
          🗳️ Know Your Voter
        </div>
        <div class="flex gap-4 items-center">
          <button id="backBtn" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
            ← Back
          </button>
          <button id="printBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
            🖨️ Print
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-b-2xl p-6 sm:p-8 mt-4 mb-4">

    <!-- Header -->
    <div class="mb-8">
      <h1 id="pageTitle" class="text-3xl font-bold text-indigo-700 mb-2">Booth-wise Last Names Analysis</h1>
      <p id="pageSubtitle" class="text-gray-600">📍 <span id="districtName"></span> • <span id="constituencyName"></span></p>
      <p id="generatedDate" class="text-sm text-gray-500 mt-2"></p>
    </div>

    <!-- Booth Selector (no-print) -->
    <div class="mb-6 space-y-4 no-print">
      <!-- Single Booth Selection -->
      <div class="flex gap-2 items-center">
        <label class="font-semibold">Single Booth:</label>
        <select id="boothFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">-- All Booths --</option>
        </select>
      </div>

      <!-- Range Selection -->
      <div class="flex gap-2 items-center flex-wrap">
        <label class="font-semibold">Or Select Range:</label>
        <input type="number" id="boothFromInput" placeholder="From" min="1" class="px-4 py-2 border border-gray-300 rounded-lg w-24 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <span class="text-gray-600">to</span>
        <input type="number" id="boothToInput" placeholder="To" min="1" class="px-4 py-2 border border-gray-300 rounded-lg w-24 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <button id="applyRangeBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-semibold">
          Apply Range
        </button>
        <button id="clearRangeBtn" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
          Clear
        </button>
      </div>
    </div>

    <!-- Data Container -->
    <div id="analysisContainer" class="space-y-8"></div>

  </div>

  <script>
    let boothDataJSON = null;
    let constituencyData = null;
    let voterCache = {}; // Cache voters by booth number
    const params = new URLSearchParams(window.location.search);
    const district = params.get('district') || 'N/A';
    const constituency = params.get('constituency') || 'N/A';

    // Initialize page
    document.getElementById('districtName').textContent = district;
    document.getElementById('constituencyName').textContent = constituency;

    // Load constituency data from districts.json
    async function loadConstituencyData() {
      try {
        const res = await fetch('districts.json');
        const data = await res.json();
        if (data[district]) {
          constituencyData = data[district].find(c => c.constituency === constituency);
        }
      } catch (err) {
        console.error('Error loading districts.json:', err);
      }
    }

    // Load booth data
    async function loadBoothData() {
      try {
        const filename = `${constituency.toLowerCase()}-booths.json`;
        const res = await fetch(filename);
        if (res.ok) {
          boothDataJSON = await res.json();
          document.getElementById('generatedDate').textContent = `Generated: ${new Date(boothDataJSON.generated_at).toLocaleString()}`;
          populateBoothFilter();
          displayAllBooths();
        } else {
          document.getElementById('analysisContainer').innerHTML = `<p class="text-red-600">Data not found for ${constituency}</p>`;
        }
      } catch (err) {
        console.error('Error loading booth data:', err);
        document.getElementById('analysisContainer').innerHTML = `<p class="text-red-600">Error loading data: ${err.message}</p>`;
      }
    }

    // Populate booth filter dropdown
    function populateBoothFilter() {
      if (!boothDataJSON) return;
      const boothNumbers = Object.keys(boothDataJSON.booths).map(Number).sort((a, b) => a - b);
      const select = document.getElementById('boothFilter');
      select.innerHTML = `<option value="">-- All Booths --</option>
        ${boothNumbers.map(b => `<option value="${b}">Booth ${b}</option>`).join('')}`;
    }

    // Display all booths in 3-column layout
    function displayAllBooths() {
      if (!boothDataJSON) return;
      
      const booths = boothDataJSON.booths;
      const boothNumbers = Object.keys(booths).map(Number).sort((a, b) => a - b);
      const container = document.getElementById('analysisContainer');

      container.innerHTML = boothNumbers.map(boothNum => {
        const data = booths[boothNum];
        const lastNames = data.last_names;

        if (lastNames.length === 0) {
          return `
            <div class="bg-gray-50 border border-gray-300 rounded-lg p-6 print-break">
              <h3 class="text-xl font-semibold text-indigo-700 mb-2">Booth ${boothNum}</h3>
              <p class="text-sm text-gray-600 mb-4">Total Voters: <strong>${data.total_voters}</strong></p>
              <p class="text-gray-500">No last names with count > 8</p>
            </div>
          `;
        }

        // Divide last names into 3 columns vertically
        const rowsPerColumn = Math.ceil(lastNames.length / 3);
        const rows = [];
        for (let i = 0; i < rowsPerColumn; i++) {
          const row = [];
          for (let col = 0; col < 3; col++) {
            const index = col * rowsPerColumn + i;
            const item = lastNames[index];
            if (item) {
              row.push(`
                <td class="py-2 px-3 border font-medium">${item.name}</td>
                <td class="py-2 px-3 border text-center">${item.count}</td>
              `);
            } else {
              row.push(`
                <td class="py-2 px-3 border"></td>
                <td class="py-2 px-3 border"></td>
              `);
            }
          }
          rows.push(`<tr class="even:bg-gray-50">${row.join('')}</tr>`);
        }

        return `
          <div class="bg-gray-50 border border-gray-300 rounded-lg p-6 print-break">
            <h3 class="text-xl font-semibold text-indigo-700 mb-2">Booth ${boothNum}</h3>
            <p class="text-sm text-gray-600 mb-4">Total Voters: <strong>${data.total_voters}</strong></p>
            <div class="overflow-x-auto">
              <table class="w-full text-center text-sm border border-gray-300">
                <thead class="bg-indigo-100 text-gray-700">
                  <tr>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }).join('');
    }

    // Fetch voters for a booth
    async function fetchVotersForBooth(boothNum) {
      if (!constituencyData) return [];
      if (voterCache[boothNum]) return voterCache[boothNum];

      try {
        const sheetId = window.getSheetIdForBooth(constituencyData, boothNum);
        if (!sheetId) {
          console.error(`No sheet found for booth ${boothNum}`);
          return [];
        }

        const voters = await searchVoters(sheetId, boothNum, {});
        voterCache[boothNum] = voters;
        return voters;
      } catch (err) {
        console.error(`Error fetching voters for booth ${boothNum}:`, err);
        return [];
      }
    }

    // Filter by booth
    async function filterByBooth(boothNum) {
      if (!boothDataJSON) return;
      
      const booths = boothDataJSON.booths;
      const container = document.getElementById('analysisContainer');

      if (boothNum === '' || boothNum === null) {
        displayAllBooths();
      } else {
        const data = booths[boothNum];
        const lastNames = data.last_names;
        const lastNameSet = new Set(lastNames.map(item => item.name));

        let html = `
          <div class="bg-gray-50 border border-gray-300 rounded-lg p-6">
            <h3 class="text-2xl font-semibold text-indigo-700 mb-4">Booth ${boothNum}</h3>
            <p class="text-gray-600 mb-4">Total Voters: <strong>${data.total_voters}</strong></p>
        `;

        if (lastNames.length === 0) {
          html += `<p class="text-gray-500">No last names with count > 8</p>`;
        } else {
          // Divide last names into 3 columns vertically
          const rowsPerColumn = Math.ceil(lastNames.length / 3);
          const rows = [];
          for (let i = 0; i < rowsPerColumn; i++) {
            const row = [];
            for (let col = 0; col < 3; col++) {
              const index = col * rowsPerColumn + i;
              const item = lastNames[index];
              if (item) {
                row.push(`
                  <td class="py-2 px-3 border font-medium">${item.name}</td>
                  <td class="py-2 px-3 border text-center">${item.count}</td>
                `);
              } else {
                row.push(`
                  <td class="py-2 px-3 border"></td>
                  <td class="py-2 px-3 border"></td>
                `);
              }
            }
            rows.push(`<tr class="even:bg-gray-50">${row.join('')}</tr>`);
          }

          html += `
            <div class="overflow-x-auto">
              <table class="w-full text-center text-sm border border-gray-300">
                <thead class="bg-indigo-100 text-gray-700">
                  <tr>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.join('')}
                </tbody>
              </table>
            </div>
          `;
        }

        html += `</div>`;

        // Fetch and display voters with these last names
        html += `<div class="mt-6 p-4 bg-blue-50 border border-blue-300 rounded-lg"><p class="text-blue-700">Loading voter data...</p></div>`;
        
        container.innerHTML = html;

        // Fetch voters in background
        const voters = await fetchVotersForBooth(boothNum);
        const filteredVoters = voters.filter(voter => lastNameSet.has(voter['Last Name']?.trim()));

        // Build voter table
        let voterHtml = `
          <div class="mt-6 bg-white border border-gray-300 rounded-lg p-6">
            <h3 class="text-xl font-semibold text-indigo-700 mb-4">📋 Voters with Listed Last Names (${filteredVoters.length})</h3>
        `;

        if (filteredVoters.length === 0) {
          voterHtml += `<p class="text-gray-600">No voters found with the listed last names.</p>`;
        } else {
          voterHtml += `
            <div class="overflow-x-auto">
              <table class="w-full text-left text-sm border border-gray-300">
                <thead class="bg-indigo-100 text-gray-700">
                  <tr>
                    <th class="py-2 px-3 border">First Name</th>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Gender</th>
                    <th class="py-2 px-3 border">Age</th>
                    <th class="py-2 px-3 border">EPIC ID</th>
                  </tr>
                </thead>
                <tbody>
                  ${filteredVoters.map((voter, idx) => `
                    <tr class="${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'}">
                      <td class="py-2 px-3 border">${voter['First Name'] || '-'}</td>
                      <td class="py-2 px-3 border font-medium">${voter['Last Name'] || '-'}</td>
                      <td class="py-2 px-3 border">${voter['Gender'] || '-'}</td>
                      <td class="py-2 px-3 border">${voter['Age'] || '-'}</td>
                      <td class="py-2 px-3 border">${voter['ID'] || '-'}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `;
        }

        voterHtml += `</div>`;

        // Re-render with both tables
        let finalHtml = container.innerHTML.replace(/<div class="mt-6 p-4 bg-blue-50[^>]*>.*?<\/div>/s, voterHtml);
        container.innerHTML = finalHtml;
      }
    }

    // Display booth range analysis (no voter list)
    function displayBoothRange(fromBooth, toBooth) {
      if (!boothDataJSON) return;
      
      const booths = boothDataJSON.booths;
      const boothNumbers = Object.keys(booths).map(Number).sort((a, b) => a - b);
      const filteredBooths = boothNumbers.filter(b => b >= fromBooth && b <= toBooth);
      const container = document.getElementById('analysisContainer');

      if (filteredBooths.length === 0) {
        container.innerHTML = `<p class="text-red-600">No booths found in range ${fromBooth}-${toBooth}</p>`;
        return;
      }

      container.innerHTML = filteredBooths.map(boothNum => {
        const data = booths[boothNum];
        const lastNames = data.last_names;

        if (lastNames.length === 0) {
          return `
            <div class="bg-gray-50 border border-gray-300 rounded-lg p-6 print-break">
              <h3 class="text-xl font-semibold text-indigo-700 mb-2">Booth ${boothNum}</h3>
              <p class="text-sm text-gray-600 mb-4">Total Voters: <strong>${data.total_voters}</strong></p>
              <p class="text-gray-500">No last names with count > 8</p>
            </div>
          `;
        }

        // Divide last names into 3 columns vertically
        const rowsPerColumn = Math.ceil(lastNames.length / 3);
        const rows = [];
        for (let i = 0; i < rowsPerColumn; i++) {
          const row = [];
          for (let col = 0; col < 3; col++) {
            const index = col * rowsPerColumn + i;
            const item = lastNames[index];
            if (item) {
              row.push(`
                <td class="py-2 px-3 border font-medium">${item.name}</td>
                <td class="py-2 px-3 border text-center">${item.count}</td>
              `);
            } else {
              row.push(`
                <td class="py-2 px-3 border"></td>
                <td class="py-2 px-3 border"></td>
              `);
            }
          }
          rows.push(`<tr class="even:bg-gray-50">${row.join('')}</tr>`);
        }

        return `
          <div class="bg-gray-50 border border-gray-300 rounded-lg p-6 print-break">
            <h3 class="text-xl font-semibold text-indigo-700 mb-2">Booth ${boothNum}</h3>
            <p class="text-sm text-gray-600 mb-4">Total Voters: <strong>${data.total_voters}</strong></p>
            <div class="overflow-x-auto">
              <table class="w-full text-center text-sm border border-gray-300">
                <thead class="bg-indigo-100 text-gray-700">
                  <tr>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                    <th class="py-2 px-3 border">Last Name</th>
                    <th class="py-2 px-3 border">Count</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }).join('');
    }

    // Event listeners for range selection
    document.addEventListener('DOMContentLoaded', () => {
      const applyRangeBtn = document.getElementById('applyRangeBtn');
      const clearRangeBtn = document.getElementById('clearRangeBtn');
      const boothFromInput = document.getElementById('boothFromInput');
      const boothToInput = document.getElementById('boothToInput');
      const boothFilter = document.getElementById('boothFilter');

      if (applyRangeBtn) {
        applyRangeBtn.addEventListener('click', () => {
          const fromBooth = parseInt(boothFromInput.value, 10);
          const toBooth = parseInt(boothToInput.value, 10);

          if (isNaN(fromBooth) || isNaN(toBooth)) {
            alert('Please enter valid booth numbers');
            return;
          }

          if (fromBooth > toBooth) {
            alert('From booth cannot be greater than To booth');
            return;
          }

          // Clear the single booth selector
          boothFilter.value = '';
          
          // Display range analysis
          displayBoothRange(fromBooth, toBooth);
        });
      }

      if (clearRangeBtn) {
        clearRangeBtn.addEventListener('click', () => {
          boothFromInput.value = '';
          boothToInput.value = '';
          boothFilter.value = '';
          displayAllBooths();
        });
      }
    });

    // Event listeners
    document.getElementById('backBtn').addEventListener('click', () => {
      window.history.back();
    });

    document.getElementById('printBtn').addEventListener('click', () => {
      window.print();
    });

    document.getElementById('boothFilter').addEventListener('change', (e) => {
      filterByBooth(e.target.value);
    });

    // Load data on page load
    (async () => {
      await loadConstituencyData();
      await loadBoothData();
    })();
  </script>

</body>

</html>
